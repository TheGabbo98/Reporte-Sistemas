<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SysReport - Control de Reportes</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0b1120; overflow-x: hidden; }
    input, select, textarea, button { font-family: 'Outfit', sans-serif; }
    select option { background: #0f172a; color: #e2e8f0; }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: #0f172a; }
    ::-webkit-scrollbar-thumb { background: #334155; border-radius: 3px; }
    @keyframes fadeUp { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:translateY(0); } }
    @keyframes shake { 0%,100%{transform:translateX(0)} 20%,60%{transform:translateX(-6px)} 40%,80%{transform:translateX(6px)} }
    @keyframes spin { to { transform:rotate(360deg); } }
    @keyframes syncPulse { 0%{transform:translateX(-100%)} 100%{transform:translateX(100%)} }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/lodash.js/4.17.21/lodash.min.js"></script>

  <script type="text/babel">
    const { useState, useEffect, useMemo, useCallback } = React;

    // ─── Constants ───────────────────────────────────────────
    const TIPOS = ["POSNET", "ISP", "EQUIPO", "BALANZAS", "S.OPERATIVO", "S.POS"];
    const TIPO_COLORS = {
      POSNET: "#e74c3c", ISP: "#3498db", EQUIPO: "#2ecc71",
      BALANZAS: "#f39c12", "S.OPERATIVO": "#9b59b6", "S.POS": "#1abc9c"
    };
    const TIPO_DESC = {
      POSNET: "Problema relacionado con el posnet",
      ISP: "Problemas con el proveedor de Internet",
      EQUIPO: "Hardware: Teclado, Scanner, Comandera, Monitor, Cables, CPU",
      BALANZAS: "Problemas con la balanza o RES PRECIOS",
      "S.OPERATIVO": "Problemas con Windows",
      "S.POS": "Problemas con el Punto de Venta"
    };

    // ─── Normalize (remove accents for search) ────────────────
    const norm = (s) => (s || "").normalize("NFD").replace(/[\u0300-\u036f]/g, "").toLowerCase();

    // Calcular días desde una fecha
    const daysSince = (dateStr) => {
      if (!dateStr) return 0;
      const d = new Date(dateStr);
      const now = new Date();
      return Math.floor((now - d) / (1000 * 60 * 60 * 24));
    };

    // Color según antigüedad
    const ageColor = (days) => {
      if (days <= 3) return { bg: "rgba(34,197,94,0.15)", border: "#16a34a", text: "#34d399" };   // verde
      if (days <= 6) return { bg: "rgba(245,158,11,0.15)", border: "#d97706", text: "#fbbf24" };  // naranja
      return { bg: "rgba(239,68,68,0.15)", border: "#dc2626", text: "#f87171" };                  // rojo
    };

    // ─── Airtable name mapping ─────────────────────────────
    // Nombre del sistema → nombre exacto en Airtable (Single Select)
    // Si Airtable rechaza un nombre, ajustá los valores acá
    const TECH_AIRTABLE = {
      "Gabriel": "Gabriel",
      "Pablo": "Pablo Collaud",
      "Tomas": "Tomas Locarnini",
      "Jhoan": "Jhoan Rebolledo",
      "Juan": "Juan"
    };
    // Reversa: nombre de Airtable → nombre corto del sistema
    const toShort = (fullName) => {
      for (const k in TECH_AIRTABLE) { if (TECH_AIRTABLE[k] === fullName) return k; }
      return fullName;
    };
    const toFull = (shortName) => TECH_AIRTABLE[shortName] || shortName;

    // ─── LocalStorage Helper ─────────────────────────────────
    const ps = {
      get(k) { try { const v = localStorage.getItem(k); return v ? JSON.parse(v) : null; } catch { return null; } },
      set(k, v) { try { localStorage.setItem(k, JSON.stringify(v)); } catch(e) { console.error(e); } }
    };

    // ─── API Client ──────────────────────────────────────────
    function createApi(baseUrl) {
      const get = async (params) => {
        const qs = new URLSearchParams(params).toString();
        const r = await fetch(baseUrl + "?" + qs, { redirect: "follow" });
        if (!r.ok) throw new Error("HTTP " + r.status);
        return r.json();
      };
      const post = async (body) => {
        const r = await fetch(baseUrl, {
          method: "POST", redirect: "follow",
          headers: { "Content-Type": "text/plain;charset=utf-8" },
          body: JSON.stringify(body)
        });
        if (!r.ok) throw new Error("HTTP " + r.status);
        return r.json();
      };
      return {
        ping: () => get({ action: "ping" }),
        login: (userId, password) => get({ action: "login", userId, password }),
        getReports: () => get({ action: "getReports" }),
        getLocales: () => get({ action: "getLocales" }),
        getUsuarios: () => get({ action: "getUsuarios" }),
        getCatalogo: () => get({ action: "getCatalogo" }),
        getReclamosProgreso: () => get({ action: "getReclamosProgreso" }),
        getReclamosAll: () => get({ action: "getReclamosAll" }),
        createReclamo: (data, userName) => post({ action: "createReclamo", data, userName }),
        resolveReclamo: (id) => post({ action: "resolveReclamo", id }),
        addReport: (data) => post({ action: "addReport", data }),
        deleteReport: (id, userRole, userName) => post({ action: "deleteReport", id, userRole, userName }),
        addLocal: (data) => post({ action: "addLocal", data }),
        bulkAddLocales: (locales) => post({ action: "bulkAddLocales", locales }),
        removeLocal: (id, userRole) => post({ action: "removeLocal", id, userRole }),
        addUsuario: (data, userRole) => post({ action: "addUsuario", data, userRole }),
        updateUsuario: (data, userRole) => post({ action: "updateUsuario", data, userRole }),
        deleteUsuario: (id, userRole) => post({ action: "deleteUsuario", id, userRole }),
        changeOwnPassword: (userId, currentPassword, newPassword) => post({ action: "changeOwnPassword", userId, currentPassword, newPassword }),
      };
    }

    // ─── Icons ───────────────────────────────────────────────
    const I = ({ n, s = 20, c = "currentColor" }) => {
      const paths = {
        dashboard: "M3 13h8V3H3v10zm0 8h8v-6H3v6zm10 0h8V11h-8v10zm0-18v6h8V3h-8z",
        add: "M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z",
        list: "M3 13h2v-2H3v2zm0 4h2v-2H3v2zm0-8h2V7H3v2zm4 4h14v-2H7v2zm0 4h14v-2H7v2zM7 7v2h14V7H7z",
        store: "M20 4H4v2h16V4zm1 10v-2l-1-5H4l-1 5v2h1v6h10v-6h4v6h2v-6h1zm-9 4H6v-4h6v4z",
        logout: "M17 7l-1.41 1.41L18.17 11H8v2h10.17l-2.58 2.58L17 17l5-5zM4 5h8V3H4c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h8v-2H4V5z",
        delete: "M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z",
        search: "M15.5 14h-.79l-.28-.27A6.47 6.47 0 0016 9.5 6.5 6.5 0 109.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z",
        upload: "M9 16h6v-6h4l-7-7-7 7h4zm-4 2h14v2H5z",
        users: "M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z",
        close: "M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z",
        check: "M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z",
        edit: "M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04c.39-.39.39-1.02 0-1.41l-2.34-2.34a.996.996 0 00-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z",
        calendar: "M20 3h-1V1h-2v2H7V1H5v2H4c-1.1 0-2 .9-2 2v16c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 18H4V8h16v13z",
        refresh: "M17.65 6.35A7.958 7.958 0 0012 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08A5.99 5.99 0 0112 18c-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z",
        link: "M3.9 12c0-1.71 1.39-3.1 3.1-3.1h4V7H7c-2.76 0-5 2.24-5 5s2.24 5 5 5h4v-1.9H7c-1.71 0-3.1-1.39-3.1-3.1zM8 13h8v-2H8v2zm9-6h-4v1.9h4c1.71 0 3.1 1.39 3.1 3.1s-1.39 3.1-3.1 3.1h-4V17h4c2.76 0 5-2.24 5-5s-2.24-5-5-5z",
        key: "M12.65 10A5.99 5.99 0 007 6c-3.31 0-6 2.69-6 6s2.69 6 6 6a5.99 5.99 0 005.65-4H17v4h4v-4h2v-4H12.65zM7 14c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2z",
        card: "M20 4H4c-1.11 0-1.99.89-1.99 2L2 18c0 1.11.89 2 2 2h16c1.11 0 2-.89 2-2V6c0-1.11-.89-2-2-2zm0 14H4v-6h16v6zm0-10H4V6h16v2z",
        alert: "M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z",
      };
      return <svg width={s} height={s} viewBox="0 0 24 24" fill={c}>{paths[n] && <path d={paths[n]}/>}</svg>;
    };

    // ─── API URL (hardcoded) ────────────────────────────────
    const API_URL = "https://script.google.com/macros/s/AKfycbwGKAnCeVycPFSDiatuK-3-_aDAknw60DK2NWaq4BOA2owFzy4XnE7jn4-YZoUUVfM5Ng/exec";

    // ─── Main App ────────────────────────────────────────────
    function App() {
      const [phase, setPhase] = useState("loading");
      const [apiUrl, setApiUrl] = useState("");
      const [api, setApi] = useState(null);
      const [user, setUser] = useState(null);
      const [page, setPage] = useState("dashboard");
      const [reports, setReports] = useState([]);
      const [locals, setLocals] = useState([]);
      const [users, setUsers] = useState([]);
      const [catalogo, setCatalogo] = useState([]);
      const [reclamosProgreso, setReclamosProgreso] = useState([]);
      const [reclamosAll, setReclamosAll] = useState([]);
      const [sidebarOpen, setSidebarOpen] = useState(window.innerWidth > 768);
      const [toast, setToast] = useState(null);
      const [syncing, setSyncing] = useState(false);
      const [showPassModal, setShowPassModal] = useState(false);

      const isAdmin = user?.role === "admin";

      useEffect(() => {
        setApiUrl(API_URL);
        setApi(createApi(API_URL));
        const savedUser = ps.get("sysreport-user");
        if (savedUser) { setUser(savedUser); setPhase("app"); }
        else { setPhase("login"); }
      }, []);

      useEffect(() => { if (phase === "app" && api) refreshData(); }, [phase, api]);

      const showToast = useCallback((msg, type = "success") => {
        setToast({ msg, type }); setTimeout(() => setToast(null), 3500);
      }, []);

      const refreshData = async () => {
        if (!api) return;
        setSyncing(true);
        try {
          const [rR, lR, uR] = await Promise.all([api.getReports(), api.getLocales(), api.getUsuarios()]);
          if (rR.success) setReports(rR.data || []);
          if (lR.success) setLocals(lR.data || []);
          if (uR.success) setUsers(uR.data || []);
        } catch (e) { showToast("Error de conexión con la API", "error"); console.error(e); }
        // Catálogo se carga por separado para no romper lo demás si falla
        try {
          const cR = await api.getCatalogo();
          if (cR.success) setCatalogo(cR.data || []);
          else console.warn("Catálogo no disponible:", cR.error);
        } catch (e) { console.warn("Error cargando catálogo:", e); }
        // Reclamos Posnet (Airtable) - también por separado
        try {
          const [rp, ra] = await Promise.all([api.getReclamosProgreso(), api.getReclamosAll()]);
          const addShort = (arr) => (arr || []).map(r => ({...r, asignadoShort: toShort(r.asignado)}));
          if (rp.success) setReclamosProgreso(addShort(rp.data));
          if (ra.success) setReclamosAll(addShort(ra.data));
        } catch (e) { console.warn("Error cargando reclamos:", e); }
        setSyncing(false);
      };

      const handleLogin = async (userId, password) => {
        try {
          const res = await api.login(userId, password);
          if (res.success) { setUser(res.data); ps.set("sysreport-user", res.data); setPhase("app"); return { success: true }; }
          return { success: false, error: res.error || "Credenciales inválidas" };
        } catch { return { success: false, error: "Error de conexión" }; }
      };

      const handleLogout = () => { setUser(null); ps.set("sysreport-user", null); setPhase("login"); setPage("dashboard"); };

      if (phase === "loading") return <div style={S.center}><div style={S.spinner}/></div>;
      if (phase === "login") return <LoginScreen api={api} onLogin={handleLogin} />;

      const navItems = [
        { id: "dashboard", label: "Dashboard", icon: "dashboard" },
        { id: "nuevo", label: "Nuevo Reporte", icon: "add" },
        { id: "historial", label: "Historial", icon: "list" },
        { id: "reclamos", label: "Reclamos Posnet", icon: "card" },
        { id: "locales", label: "Locales", icon: "store" },
        ...(isAdmin ? [{ id: "usuarios", label: "Usuarios", icon: "users" }] : []),
      ];

      return (
        <div style={S.root}>
          <aside style={{...S.sidebar, width: sidebarOpen ? 256 : 68}}>
            <div style={S.sideHead}>
              <div style={{display:"flex",alignItems:"center",gap:10,overflow:"hidden"}}>
                <div style={S.logoBox}>⚡</div>
                {sidebarOpen && <span style={S.logoTxt}>SysReport</span>}
              </div>
              <button onClick={() => setSidebarOpen(!sidebarOpen)} style={S.togBtn}>
                <svg width="16" height="16" viewBox="0 0 24 24" fill="#64748b"><path d={sidebarOpen ? "M15.41 16.59L10.83 12l4.58-4.59L14 6l-6 6 6 6z" : "M8.59 16.59L13.17 12 8.59 7.41 10 6l6 6-6 6z"}/></svg>
              </button>
            </div>
            <nav style={S.nav}>
              {navItems.map(it => (
                <button key={it.id} onClick={() => setPage(it.id)} style={{...S.navBtn, ...(page === it.id ? S.navAct : {})}}>
                  <I n={it.icon} s={20} c={page === it.id ? "#a78bfa" : "#64748b"}/>
                  {sidebarOpen && <span style={{marginLeft:12,whiteSpace:"nowrap"}}>{it.label}</span>}
                </button>
              ))}
            </nav>
            <div style={S.sideFoot}>
              <div style={{display:"flex",alignItems:"center",gap:10,overflow:"hidden",flex:1,minWidth:0}}>
                <div style={{...S.ava, background: isAdmin ? "#7c3aed" : "#059669"}}>{user.nombre[0]}</div>
                {sidebarOpen && <div style={{minWidth:0}}>
                  <div style={{color:"#e2e8f0",fontSize:13,fontWeight:600,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{user.nombre}</div>
                  <div style={{color:"#64748b",fontSize:10,textTransform:"uppercase",letterSpacing:1.5,fontWeight:700}}>{isAdmin ? "Admin" : "Técnico"}</div>
                </div>}
              </div>
              {sidebarOpen && <div style={{display:"flex",gap:4}}>
                <button onClick={()=>setShowPassModal(true)} style={S.togBtn} title="Cambiar contraseña"><I n="key" s={16} c="#64748b"/></button>
                <button onClick={refreshData} style={S.togBtn} title="Sincronizar"><I n="refresh" s={16} c={syncing ? "#a78bfa" : "#64748b"}/></button>
                <button onClick={handleLogout} style={S.togBtn} title="Salir"><I n="logout" s={16} c="#64748b"/></button>
              </div>}
            </div>
          </aside>

          <main style={{...S.main, marginLeft: sidebarOpen ? 256 : 68}}>
            {syncing && <div style={S.syncBar}/>}
            {page === "dashboard" && <DashboardPage reports={reports} locals={locals} users={users} reclamosProgreso={reclamosProgreso} isAdmin={isAdmin} currentUser={user} onNavigate={setPage}/>}
            {page === "nuevo" && <NewReportPage api={api} locals={locals} catalogo={catalogo} reclamosProgreso={reclamosProgreso} user={user} isAdmin={isAdmin} onSuccess={() => { refreshData(); showToast("Reporte cargado"); }} showToast={showToast}/>}
            {page === "historial" && <HistoryPage api={api} reports={reports} locals={locals} isAdmin={isAdmin} userRole={user.role} currentUser={user} onRefresh={refreshData} showToast={showToast}/>}
            {page === "reclamos" && <ReclamosPage api={api} reclamosProgreso={reclamosProgreso} reclamosAll={reclamosAll} locals={locals} user={user} isAdmin={isAdmin} onRefresh={refreshData} showToast={showToast}/>}
            {page === "locales" && <LocalesPage api={api} locals={locals} isAdmin={isAdmin} userRole={user.role} onRefresh={refreshData} showToast={showToast}/>}
            {page === "usuarios" && isAdmin && <UsersPage api={api} users={users} userRole={user.role} onRefresh={refreshData} showToast={showToast}/>}
          </main>
          {toast && <div style={{...S.toast, background: toast.type==="error"?"#dc2626":toast.type==="warning"?"#d97706":"#16a34a"}}>{toast.msg}</div>}
          {showPassModal && <ChangePasswordModal api={api} user={user} onClose={()=>setShowPassModal(false)} showToast={showToast} onLogout={handleLogout}/>}
        </div>
      );
    }

    // ─── Login ───────────────────────────────────────────────
    function LoginScreen({ api, onLogin }) {
      const [uid, setUid] = useState("");
      const [pwd, setPwd] = useState("");
      const [err, setErr] = useState("");
      const [loading, setLoading] = useState(false);
      const [shake, setShake] = useState(false);

      const handleSubmit = async () => {
        if (!uid || !pwd) { setErr("Completá ambos campos"); return; }
        setLoading(true); setErr("");
        const res = await onLogin(uid, pwd);
        if (!res.success) { setErr(res.error); setShake(true); setTimeout(() => setShake(false), 500); }
        setLoading(false);
      };

      return (
        <div style={S.center}>
          <div style={{...S.loginCard, animation: shake ? "shake .5s ease" : "fadeUp .5s ease"}}>
            <div style={S.logoBox2}>⚡</div>
            <h1 style={{color:"#f1f5f9",fontSize:26,fontWeight:800,textAlign:"center",margin:"0 0 4px"}}>SysReport</h1>
            <p style={{color:"#64748b",textAlign:"center",margin:"0 0 32px",fontSize:14}}>Sistema de Control de Reportes</p>
            <div style={{marginBottom:18}}>
              <label style={S.lbl}>Usuario</label>
              <input value={uid} onChange={e=>{setUid(e.target.value);setErr("");}} onKeyDown={e=>e.key==="Enter"&&handleSubmit()} placeholder="Ingresá tu usuario" style={S.inp}/>
            </div>
            <div style={{marginBottom:18}}>
              <label style={S.lbl}>Contraseña</label>
              <input type="password" value={pwd} onChange={e=>{setPwd(e.target.value);setErr("");}} onKeyDown={e=>e.key==="Enter"&&handleSubmit()} placeholder="••••••••" style={S.inp}/>
            </div>
            {err && <p style={{color:"#f87171",fontSize:13,textAlign:"center",margin:"0 0 12px"}}>{err}</p>}
            <button onClick={handleSubmit} disabled={loading} style={{...S.btnPrimary,opacity:loading?0.7:1}}>{loading ? "Verificando..." : "Iniciar Sesión"}</button>
          </div>
        </div>
      );
    }

    // ─── Dashboard ───────────────────────────────────────────
    function DashboardPage({ reports, locals, users, reclamosProgreso, isAdmin, currentUser, onNavigate }) {
      const [mesFilter, setMesFilter] = useState(() => {
        const n = new Date(); return n.getFullYear() + "-" + String(n.getMonth()+1).padStart(2,"0");
      });
      const [rs, setRs] = useState("");
      const [re, setRe] = useState("");
      const [vista, setVista] = useState("general"); // "general" | "personal"

      const filtered = useMemo(() => {
        if (rs && re) return reports.filter(r => { const d = (r.creadoEn||r.fecha||"").slice(0,10); return d >= rs && d <= re; });
        return reports.filter(r => (r.creadoEn||r.fecha||"").startsWith(mesFilter));
      }, [reports, mesFilter, rs, re]);

      const viewData = vista === "personal" ? filtered.filter(r => r.atendidoPor === currentUser.nombre) : filtered;
      const totalMes = viewData.length;
      const localesQueReportaron = [...new Set(viewData.map(r => r.local))].length;

      const fallaMasRepetida = useMemo(() => {
        const c = _.countBy(viewData, "tipo");
        const mx = _.maxBy(Object.entries(c), function(e){ return e[1]; });
        return mx ? { tipo: mx[0], count: mx[1] } : null;
      }, [viewData]);

      const localMasReclamos = useMemo(() => {
        const c = _.countBy(viewData, "local");
        const mx = _.maxBy(Object.entries(c), function(e){ return e[1]; });
        if (!mx) return null;
        const rl = viewData.filter(r => r.local === mx[0]);
        const fl = _.countBy(rl, "tipo");
        const tf = _.maxBy(Object.entries(fl), function(e){ return e[1]; });
        return { local: mx[0], count: mx[1], topFalla: tf?.[0], topFallaCount: tf?.[1] };
      }, [viewData]);

      const tipoStats = useMemo(() => {
        const c = _.countBy(viewData, "tipo");
        return TIPOS.map(t => ({ tipo: t, count: c[t] || 0 })).sort((a,b) => b.count - a.count);
      }, [viewData]);

      const techStats = useMemo(() => {
        const c = _.countBy(filtered, "atendidoPor");
        return Object.entries(c).map(function(e){ return {nombre:e[0],count:e[1]}; }).sort((a,b) => b.count - a.count);
      }, [filtered]);

      const localStats = useMemo(() => {
        const c = _.countBy(viewData, "local");
        return Object.entries(c).map(function(e){ return {nombre:e[0],count:e[1]}; }).sort((a,b) => b.count - a.count).slice(0,10);
      }, [viewData]);

      const motivoStats = useMemo(() => {
        const c = _.countBy(viewData, "motivo");
        return Object.entries(c).map(function(e){ return {motivo:e[0],count:e[1]}; }).sort((a,b) => b.count - a.count).slice(0,10);
      }, [viewData]);

      const maxT = Math.max(...tipoStats.map(t => t.count), 1);

      const maxM = Math.max(...motivoStats.map(m => m.count), 1);

      });

      return (
        <div style={S.page}>
          <div style={S.pageHead}>
            <div>
              <h1 style={S.pageTitle}>Dashboard</h1>
              <p style={S.pageSub}>{vista === "personal" ? "Tus reportes — " + currentUser.nombre : "Vista general — Todos los reportes"}</p>
            </div>
            <div style={{display:"flex",gap:10,alignItems:"center",flexWrap:"wrap"}}>
              {/* Vista toggle */}
              <div style={{background:"#0f172a",borderRadius:9,padding:3,display:"flex",gap:2,border:"1px solid #334155",alignSelf:"flex-end"}}>
                <button onClick={()=>setVista("general")} style={toggleStyle(vista==="general")}>General</button>
                <button onClick={()=>setVista("personal")} style={toggleStyle(vista==="personal")}>Personal</button>

              <FG l="Mes"><input type="month" value={mesFilter} onChange={e=>{setMesFilter(e.target.value);setRs("");setRe("");}} style={S.fInp}/></FG>
              <FG l="Desde"><input type="date" value={rs} onChange={e=>setRs(e.target.value)} style={S.fInp}/></FG>
              <FG l="Hasta"><input type="date" value={re} onChange={e=>setRe(e.target.value)} style={S.fInp}/></FG>
              {(rs||re) && <button onClick={()=>{setRs("");setRe("");}} style={{...S.fInp,cursor:"pointer",background:"#1e293b",color:"#f87171",border:"1px solid #334155",padding:"6px 12px",marginTop:18}}>✕ Limpiar</button>}
            </div>
          </div>

          <div style={S.kpiGrid}>
            <KPI border="#7c3aed" label="Total Reportes" value={totalMes}/>
            <KPI border="#059669" label="Locales que reportaron" value={localesQueReportaron} sub={"/ " + locals.length}/>
            <KPI border={fallaMasRepetida ? TIPO_COLORS[fallaMasRepetida.tipo] : "#475569"} label="Falla más repetida" value={fallaMasRepetida?.tipo || "—"} sub2={fallaMasRepetida ? fallaMasRepetida.count + " reportes" : ""}/>
            <KPI border="#d97706" label="Local con más reclamos" value={localMasReclamos?.local || "—"} valueSize={20} sub2={localMasReclamos ? localMasReclamos.count + " rep · Top: " + localMasReclamos.topFalla + " (" + localMasReclamos.topFallaCount + ")" : ""}/>
          </div>

          {/* Resumen Reclamos Posnet */}
          {(() => {
            const misReclamos = isAdmin ? reclamosProgreso : reclamosProgreso.filter(r => r.asignadoShort === currentUser.nombre);
            return misReclamos && misReclamos.length > 0 && <ReclamosSummaryCard reclamosProgreso={misReclamos} onNavigate={onNavigate}/>;
          })()}

          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16,marginBottom:16}}>
            <div style={S.card}>
              <h3 style={S.cardTitle}>Reportes por Tipo</h3>
              <div style={{display:"flex",flexDirection:"column",gap:8,marginTop:14}}>
                {tipoStats.map(t => (
                  <div key={t.tipo} style={{display:"flex",alignItems:"center",gap:10}}>
                    <div style={{width:85,fontSize:11,fontWeight:600,color:"#94a3b8",fontFamily:"'JetBrains Mono',monospace"}}>{t.tipo}</div>
                    <div style={{flex:1,background:"#0f172a",borderRadius:6,height:26,position:"relative",overflow:"hidden"}}>
                      <div style={{width:(t.count/maxT)*100+"%",height:"100%",background:TIPO_COLORS[t.tipo],borderRadius:6,transition:"width .6s ease",minWidth:t.count>0?20:0}}/>
                      <span style={{position:"absolute",right:8,top:4,fontSize:11,fontWeight:700,color:"#fff"}}>{t.count}</span>
                    </div>
                  </div>
                ))}
              </div>
            </div>
            <div style={S.card}>
              <h3 style={S.cardTitle}>Top 10 Locales</h3>
              <div style={{display:"flex",flexDirection:"column",gap:8,marginTop:14}}>
                {localStats.length===0 && <p style={{color:"#475569",fontSize:13}}>Sin datos</p>}
                {localStats.map((l,i) => (
                  <div key={l.nombre} style={{display:"flex",alignItems:"center",gap:10}}>
                    <div style={{width:22,height:22,borderRadius:6,background:i<3?"#d97706":"#1e293b",display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,fontWeight:700,color:i<3?"#000":"#64748b",flexShrink:0}}>{i+1}</div>
                    <div style={{width:110,fontSize:12,color:"#cbd5e1",fontWeight:500,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{l.nombre}</div>
                    <div style={{flex:1,background:"#0f172a",borderRadius:6,height:22,position:"relative",overflow:"hidden"}}>
                      <div style={{width:(l.count/maxL)*100+"%",height:"100%",background:"linear-gradient(90deg,#6d28d9,#a78bfa)",borderRadius:6,transition:"width .6s ease",minWidth:l.count>0?18:0}}/>
                      <span style={{position:"absolute",right:6,top:3,fontSize:10,fontWeight:700,color:"#fff"}}>{l.count}</span>
                    </div>
                  </div>
                ))}
              </div>
            </div>
          </div>

          {/* Motivos más repetidos */}
          <div style={{...S.card,marginBottom:16}}>
            <h3 style={S.cardTitle}>Motivos más repetidos</h3>
            <div style={{display:"flex",flexDirection:"column",gap:8,marginTop:14}}>
              {motivoStats.length===0 && <p style={{color:"#475569",fontSize:13}}>Sin datos</p>}
              {motivoStats.map((m,i) => (
                <div key={m.motivo} style={{display:"flex",alignItems:"center",gap:10}}>
                  <div style={{width:22,height:22,borderRadius:6,background:i<3?"#b45309":"#1e293b",display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,fontWeight:700,color:i<3?"#fff":"#64748b",flexShrink:0}}>{i+1}</div>
                  <div style={{width:200,fontSize:12,color:"#cbd5e1",fontWeight:500,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}} title={m.motivo}>{m.motivo}</div>
                  <div style={{flex:1,background:"#0f172a",borderRadius:6,height:22,position:"relative",overflow:"hidden"}}>
                    <div style={{width:(m.count/maxM)*100+"%",height:"100%",background:"linear-gradient(90deg,#b45309,#fbbf24)",borderRadius:6,transition:"width .6s ease",minWidth:m.count>0?18:0}}/>
                    <span style={{position:"absolute",right:6,top:3,fontSize:10,fontWeight:700,color:"#fff"}}>{m.count}</span>
                  </div>
                </div>
              ))}
            </div>
          </div>

          {vista === "general" && isAdmin && <div style={S.card}>
            <h3 style={S.cardTitle}>Reportes por Técnico</h3>
            <div style={{display:"flex",gap:16,marginTop:14,flexWrap:"wrap"}}>
              {techStats.map(t => (
                <div key={t.nombre} style={{background:"#0f172a",borderRadius:12,padding:"14px 20px",textAlign:"center",minWidth:110}}>
                  <div style={{width:44,height:44,borderRadius:"50%",background:"#7c3aed",display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto 6px",fontSize:18,fontWeight:700,color:"#fff"}}>{t.nombre[0]}</div>
                  <div style={{color:"#e2e8f0",fontSize:13,fontWeight:600}}>{t.nombre}</div>
                  <div style={{color:"#a78bfa",fontSize:26,fontWeight:800,marginTop:2}}>{t.count}</div>
                </div>
              ))}
              {techStats.length===0 && <p style={{color:"#475569",fontSize:13}}>Sin datos</p>}
            </div>
          </div>}
        </div>
      );
    }

    // ─── Autocomplete Field ─────────────────────────────────
    function AutoField({ value, onChange, suggestions, placeholder }) {
      const [open, setOpen] = useState(false);
      const [inputVal, setInputVal] = useState(value || "");

      useEffect(() => { setInputVal(value || ""); }, [value]);

      const filtered = inputVal ? suggestions.filter(s => norm(s).includes(norm(inputVal))) : suggestions;
      const showList = open && filtered.length > 0;
      const showNoMatch = open && inputVal && filtered.length === 0 && suggestions.length > 0;

      return (
        <div style={{position:"relative"}}>
          <input value={inputVal}
            onChange={e => { setInputVal(e.target.value); onChange(e.target.value); setOpen(true); }}
            onFocus={() => setOpen(true)}
            onBlur={() => setTimeout(() => setOpen(false), 200)}
            placeholder={placeholder} style={S.inp}/>
          {showList && <div style={S.dropdown}>
            {filtered.slice(0,10).map(s => (
              <div key={s} style={{...S.ddItem, background: s === inputVal ? "#334155" : "transparent", fontWeight: s === inputVal ? 600 : 400}}
                onMouseDown={() => { setInputVal(s); onChange(s); setOpen(false); }}>{s}</div>
            ))}
          </div>}
          {showNoMatch && <div style={S.dropdown}>
            <div style={{...S.ddItem,color:"#64748b",fontStyle:"italic",cursor:"default"}}>Sin sugerencias — texto libre</div>
          </div>}
        </div>
      );
    }

    // ─── New Report ──────────────────────────────────────────
    function NewReportPage({ api, locals, catalogo, reclamosProgreso, user, isAdmin, onSuccess, showToast }) {
      const now = new Date();
      const todayStr = now.getFullYear() + "-" + String(now.getMonth()+1).padStart(2,"0") + "-" + String(now.getDate()).padStart(2,"0");
      const nowTime = String(now.getHours()).padStart(2,"0") + ":" + String(now.getMinutes()).padStart(2,"0");
      const [form, setForm] = useState({ tipo: "", motivo: "", solucion: "", local: "", fecha: todayStr, hora: nowTime });
      const [searchLocal, setSearchLocal] = useState("");
      const [showDrop, setShowDrop] = useState(false);
      const [submitting, setSubmitting] = useState(false);

      const fl = locals.filter(l => l.activo !== false && norm(l.nombre).includes(norm(searchLocal)));

      // Catálogo filtrado por tipo seleccionado
      const motivosSugeridos = useMemo(() => {
        if (!form.tipo) return [];
        return [...new Set(catalogo.filter(c => c.tipo === form.tipo).map(c => c.motivo))];
      }, [catalogo, form.tipo]);

      const solucionesSugeridas = useMemo(() => {
        if (!form.tipo || !form.motivo) return [];
        // Buscar soluciones que coincidan exactamente con el motivo seleccionado
        const exactas = catalogo.filter(c => c.tipo === form.tipo && c.motivo === form.motivo && c.solucion).map(c => c.solucion);
        if (exactas.length > 0) return [...new Set(exactas)];
        // Si no hay match exacto, buscar por coincidencia parcial
        const parciales = catalogo.filter(c => c.tipo === form.tipo && norm(c.motivo).includes(norm(form.motivo)) && c.solucion).map(c => c.solucion);
        return [...new Set(parciales)];
      }, [catalogo, form.tipo, form.motivo]);

      const handleSubmit = async () => {
        if (!form.tipo || !form.motivo || !form.local) { showToast("Completá Local, Tipo y Motivo","error"); return; }
        setSubmitting(true);
        try {
          const res = await api.addReport({ ...form, atendidoPor: user.nombre });
          if (res.success) {
            onSuccess();
            const n2 = new Date();
            const t2 = n2.getFullYear()+"-"+String(n2.getMonth()+1).padStart(2,"0")+"-"+String(n2.getDate()).padStart(2,"0");
            const h2 = String(n2.getHours()).padStart(2,"0")+":"+String(n2.getMinutes()).padStart(2,"0");
            setForm({tipo:"",motivo:"",solucion:"",local:"",fecha:t2,hora:h2}); setSearchLocal("");
          }
          else showToast(res.error||"Error al guardar","error");
        } catch { showToast("Error de conexión","error"); }
        setSubmitting(false);
      };

      const setNow = () => {
        const n2 = new Date();
        const t2 = n2.getFullYear()+"-"+String(n2.getMonth()+1).padStart(2,"0")+"-"+String(n2.getDate()).padStart(2,"0");
        const h2 = String(n2.getHours()).padStart(2,"0")+":"+String(n2.getMinutes()).padStart(2,"0");
        setForm({...form, fecha: t2, hora: h2});
      };

      return (
        <div style={S.page}>
          <h1 style={S.pageTitle}>Nuevo Reporte</h1>
          <p style={S.pageSub}>Cargá un nuevo reporte de sistemas</p>

          {/* Banner de reclamos pendientes para técnicos */}
          {!isAdmin && <TechReclamosBanner reclamosProgreso={reclamosProgreso} user={user}/>}
          <div style={{...S.card, maxWidth:680, marginTop:20}}>
            {/* Local */}
            <div style={{marginBottom:18}}>
              <label style={S.formLbl}>Local <span style={{color:"#f87171"}}>*</span></label>
              <div style={{position:"relative"}}>
                <input value={searchLocal} onChange={e=>{setSearchLocal(e.target.value);setShowDrop(true);setForm({...form,local:""});}}
                  onFocus={()=>setShowDrop(true)} onBlur={()=>setTimeout(()=>setShowDrop(false),200)}
                  placeholder="Buscar local..." style={S.inp}/>
                {showDrop && searchLocal && <div style={S.dropdown}>
                  {fl.length===0 && <div style={S.ddItem}>No se encontraron</div>}
                  {fl.slice(0,8).map(l => <div key={l.id} style={S.ddItem} onMouseDown={()=>{setForm({...form,local:l.nombre});setSearchLocal(l.nombre);setShowDrop(false);}}>{l.nombre}</div>)}
                </div>}
              </div>
              {form.local && <span style={{fontSize:12,color:"#34d399",marginTop:4,display:"inline-block"}}>✓ {form.local}</span>}
            </div>

            {/* Tipo */}
            <div style={{marginBottom:18}}>
              <label style={S.formLbl}>Tipo <span style={{color:"#f87171"}}>*</span></label>
              <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8}}>
                {TIPOS.map(t => <button key={t} onClick={()=>setForm({...form,tipo:t,motivo:"",solucion:""})} style={{...S.tipoBtn,...(form.tipo===t?{background:TIPO_COLORS[t],color:"#fff",borderColor:TIPO_COLORS[t]}:{})}}>{t}</button>)}
              </div>
              {form.tipo && <p style={{fontSize:12,color:"#64748b",marginTop:6,fontStyle:"italic"}}>{TIPO_DESC[form.tipo]}</p>}
            </div>

            {/* Motivo con autocompletado */}
            <div style={{marginBottom:18}}>
              <label style={S.formLbl}>Motivo <span style={{color:"#f87171"}}>*</span>{motivosSugeridos.length > 0 && <span style={{color:"#64748b",fontWeight:400,marginLeft:6}}>({motivosSugeridos.length} sugerencias)</span>}</label>
              <AutoField
                value={form.motivo}
                onChange={v => setForm({...form, motivo: v, solucion: ""})}
                suggestions={motivosSugeridos}
                placeholder={form.tipo ? "Escribí o elegí un motivo..." : "Primero elegí un tipo"}
              />
            </div>

            {/* Solución con autocompletado */}
            <div style={{marginBottom:18}}>
              <label style={S.formLbl}>Solución <span style={{color:"#64748b",fontWeight:400}}>(opcional)</span>{solucionesSugeridas.length > 0 && <span style={{color:"#64748b",fontWeight:400,marginLeft:6}}>({solucionesSugeridas.length} sugerencias)</span>}</label>
              <AutoField
                value={form.solucion}
                onChange={v => setForm({...form, solucion: v})}
                suggestions={solucionesSugeridas}
                placeholder={form.motivo ? "Escribí o elegí una solución..." : "Primero elegí un motivo"}
              />
            </div>

            {/* Fecha y hora */}
            <div style={{marginBottom:18}}>
              <label style={S.formLbl}>Fecha y Hora</label>
              <div style={{display:"flex",gap:10,alignItems:"center",flexWrap:"wrap"}}>
                <input type="date" value={form.fecha} onChange={e=>setForm({...form,fecha:e.target.value})} style={{...S.fInp,fontSize:14,padding:"10px 13px"}}/>
                <input type="time" value={form.hora} onChange={e=>setForm({...form,hora:e.target.value})} style={{...S.fInp,fontSize:14,padding:"10px 13px"}}/>
                <button onClick={setNow} style={{...S.btnSecondary,fontSize:12,padding:"9px 14px"}}><I n="calendar" s={14} c="#94a3b8"/> Ahora</button>
              </div>
            </div>

            <div style={{display:"flex",gap:16,marginBottom:20,flexWrap:"wrap"}}>
              <div style={S.chip}><I n="users" s={14} c="#64748b"/> Atendido por: <strong style={{color:"#e2e8f0"}}>{user.nombre}</strong></div>
            </div>
            <button onClick={handleSubmit} disabled={submitting} style={{...S.btnPrimary,opacity:submitting?0.7:1}}>{submitting?"Guardando...":"✓ Enviar Reporte"}</button>
          </div>
        </div>
      );
    }

    // ─── History ─────────────────────────────────────────────
    function HistoryPage({ api, reports, locals, isAdmin, userRole, currentUser, onRefresh, showToast }) {
      const [fLocal, setFLocal] = useState(""); const [fTipo, setFTipo] = useState(""); const [fTech, setFTech] = useState("");
      const [fFrom, setFFrom] = useState(""); const [fTo, setFTo] = useState(""); const [search, setSearch] = useState("");
      const [confirmDel, setConfirmDel] = useState(null); const [viewR, setViewR] = useState(null);
      const [pg, setPg] = useState(1); const [deleting, setDeleting] = useState(false); const pp = 20;

      const filtered = useMemo(() => reports.filter(r => {
        if (fLocal && r.local !== fLocal) return false; if (fTipo && r.tipo !== fTipo) return false; if (fTech && r.atendidoPor !== fTech) return false;
        const d = (r.creadoEn||r.fecha||"").slice(0,10); if (fFrom && d < fFrom) return false; if (fTo && d > fTo) return false;
        if (search) { const s = norm(search); return norm(r.motivo).includes(s)||norm(r.solucion).includes(s)||norm(r.local).includes(s)||norm(r.atendidoPor).includes(s); }
        return true;
      }), [reports, fLocal, fTipo, fTech, fFrom, fTo, search]);

      const totalPg = Math.ceil(filtered.length/pp); const paginated = filtered.slice((pg-1)*pp,pg*pp);
      const techs = [...new Set(reports.map(r=>r.atendidoPor).filter(Boolean))].sort();

      const canDelete = (r) => isAdmin || r.atendidoPor === currentUser.nombre;

      const handleDelete = async () => {
        if (!confirmDel) return; setDeleting(true);
        try { const res = await api.deleteReport(confirmDel,userRole,currentUser.nombre); if(res.success){showToast("Eliminado","warning");onRefresh();}else showToast(res.error||"Error","error"); }
        catch { showToast("Error de conexión","error"); } setConfirmDel(null); setDeleting(false);
      };

      const exportCSV = () => {
        const h="TIPO,MOTIVO,SOLUCION,ATENDIO,FECHA,HORA,LOCAL\n";
        const rows=filtered.map(r=>'"'+r.tipo+'","'+(r.motivo||"").replace(/"/g,'""')+'","'+(r.solucion||"").replace(/"/g,'""')+'","'+r.atendidoPor+'","'+r.fecha+'","'+r.hora+'","'+r.local+'"').join("\n");
        const b=new Blob(["\uFEFF"+h+rows],{type:"text/csv;charset=utf-8;"}); const u=URL.createObjectURL(b); const a=document.createElement("a"); a.href=u; a.download="reportes_"+new Date().toISOString().slice(0,10)+".csv"; a.click(); URL.revokeObjectURL(u);
      };

      return (
        <div style={S.page}>
          <div style={S.pageHead}><div><h1 style={S.pageTitle}>Historial</h1><p style={S.pageSub}>{filtered.length} reportes</p></div>
            <button onClick={exportCSV} style={S.btnSecondary}><I n="upload" s={16}/> CSV</button></div>
          <div style={{...S.card,display:"flex",gap:10,flexWrap:"wrap",alignItems:"flex-end",marginBottom:16}}>
            <FG l="Buscar"><input value={search} onChange={e=>{setSearch(e.target.value);setPg(1);}} placeholder="Motivo, local..." style={{...S.fInp,width:180}}/></FG>
            <FG l="Local"><select value={fLocal} onChange={e=>{setFLocal(e.target.value);setPg(1);}} style={S.fInp}><option value="">Todos</option>{locals.map(l=><option key={l.id} value={l.nombre}>{l.nombre}</option>)}</select></FG>
            <FG l="Tipo"><select value={fTipo} onChange={e=>{setFTipo(e.target.value);setPg(1);}} style={S.fInp}><option value="">Todos</option>{TIPOS.map(t=><option key={t} value={t}>{t}</option>)}</select></FG>
            <FG l="Técnico"><select value={fTech} onChange={e=>{setFTech(e.target.value);setPg(1);}} style={S.fInp}><option value="">Todos</option>{techs.map(t=><option key={t} value={t}>{t}</option>)}</select></FG>
            <FG l="Desde"><input type="date" value={fFrom} onChange={e=>{setFFrom(e.target.value);setPg(1);}} style={S.fInp}/></FG>
            <FG l="Hasta"><input type="date" value={fTo} onChange={e=>{setFTo(e.target.value);setPg(1);}} style={S.fInp}/></FG>
          </div>
          <div style={{...S.card,padding:0,overflow:"auto"}}>
            <table style={{width:"100%",borderCollapse:"collapse"}}><thead><tr>
              {["TIPO","MOTIVO","SOLUCIÓN","ATENDIÓ","FECHA","LOCAL",""].map(h=><th key={h} style={S.th}>{h}</th>)}
            </tr></thead><tbody>
              {paginated.map(r=><tr key={r.id} style={{borderBottom:"1px solid rgba(51,65,85,0.4)"}}>
                <td style={S.td}><span style={{...S.badge,background:TIPO_COLORS[r.tipo]}}>{r.tipo}</span></td>

    // ─── Reclamos Posnet Page ────────────────────────────────
    function ReclamosPage({ api, reclamosProgreso, reclamosAll, locals, user, isAdmin, onRefresh, showToast }) {
      const [tab, setTab] = useState("progreso"); // progreso | dashboard
      const [showNew, setShowNew] = useState(false);
      const [confirmResolve, setConfirmResolve] = useState(null);
      const [busy, setBusy] = useState(false);

      // Filtros para En Progreso
      const [fLocalP, setFLocalP] = useState("");
      const [fTechP, setFTechP] = useState("");
      const [searchP, setSearchP] = useState("");

      // Filtros para Dashboard
      const [dLocal, setDLocal] = useState("");
      const [dFrom, setDFrom] = useState("");
      const [dTo, setDTo] = useState("");
      const [dMes, setDMes] = useState("");
      const [sortCol, setSortCol] = useState("fechaInicio");
      const [sortDir, setSortDir] = useState("desc");

      // Técnicos únicos
      const techs = [...new Set(reclamosProgreso.map(r => r.asignadoShort).filter(Boolean))].sort();

      // Filtrado de progreso
      const progresoFiltrado = useMemo(() => {
        return reclamosProgreso.filter(r => {
          if (fLocalP && r.local !== fLocalP) return false;
          if (fTechP && r.asignadoShort !== fTechP) return false;
          if (searchP) { const s = norm(searchP); return norm(r.motivo).includes(s) || norm(r.local).includes(s) || norm(r.nroReclamo).includes(s); }
          return true;
        }).sort((a,b) => daysSince(b.fechaInicio) - daysSince(a.fechaInicio));
      }, [reclamosProgreso, fLocalP, fTechP, searchP]);

      // Dashboard - data filtrada
      const dashData = useMemo(() => {
        return reclamosAll.filter(r => {
          if (dLocal && r.local !== dLocal) return false;
          const d = (r.fechaInicio || "").slice(0,10);
          if (dMes && !d.startsWith(dMes)) return false;
          if (dFrom && d < dFrom) return false;
          if (dTo && d > dTo) return false;
          return true;
        });
      }, [reclamosAll, dLocal, dMes, dFrom, dTo]);

      const localMasReclamos = useMemo(() => {
        const c = _.countBy(dashData, "local");
        return Object.entries(c).map(function(e){return {nombre:e[0],count:e[1]};}).sort((a,b) => b.count - a.count).slice(0,10);
      }, [dashData]);

      const motivoMasRepetido = useMemo(() => {
        const c = _.countBy(dashData, "motivo");
        return Object.entries(c).map(function(e){return {motivo:e[0],count:e[1]};}).sort((a,b) => b.count - a.count).slice(0,10);
      }, [dashData]);

      const techStats = useMemo(() => {
        const c = _.countBy(dashData, "asignadoShort");
        return Object.entries(c).map(function(e){return {nombre:e[0],count:e[1]};}).sort((a,b) => b.count - a.count);
      }, [dashData]);

      const maxLocal = Math.max(...localMasReclamos.map(l => l.count), 1);
      const maxMotivo = Math.max(...motivoMasRepetido.map(m => m.count), 1);

      const totalEnProgreso = dashData.filter(r => r.estado === "En Progreso").length;
      const totalResueltos = dashData.filter(r => r.estado === "Resuelto").length;

      const handleResolve = async () => {
        if (!confirmResolve) return;
        setBusy(true);
        try {
          const res = await api.resolveReclamo(confirmResolve.id);
          if (res.success) { showToast("Reclamo resuelto"); onRefresh(); }
          else showToast(res.error || "Error","error");
        } catch { showToast("Error de conexión","error"); }
        setConfirmResolve(null); setBusy(false);
      };

      const tabStyle = (active) => ({
        padding:"9px 18px", borderRadius:8, border:"none", cursor:"pointer", fontSize:13, fontWeight:600,
        fontFamily:"'Outfit',sans-serif", transition:"all .2s",
        background: active ? "#7c3aed" : "transparent", color: active ? "#fff" : "#64748b"
      });

      return (
        <div style={S.page}>
          <div style={S.pageHead}>
            <div>
              <h1 style={S.pageTitle}>Reclamos Posnet</h1>
              <p style={S.pageSub}>{tab === "progreso" ? `${progresoFiltrado.length} reclamos en progreso` : "Dashboard y estadísticas"}</p>
            </div>
            <div style={{display:"flex",gap:10,alignItems:"center"}}>
              <button onClick={() => setShowNew(true)} style={S.btnPrimary2}><I n="add" s={16}/> Nuevo Reclamo</button>
            </div>
          </div>

          {/* Tabs */}

                {isAdmin && <FG l="Asignado"><select value={fTechP} onChange={e=>setFTechP(e.target.value)} style={S.fInp}><option value="">Todos</option>{techs.map(t=><option key={t} value={t}>{t}</option>)}</select></FG>}

                <span><span style={{display:"inline-block",width:10,height:10,borderRadius:3,background:"#d97706",marginRight:6}}/>4-6 días</span>
                <span><span style={{display:"inline-block",width:10,height:10,borderRadius:3,background:"#dc2626",marginRight:6}}/>7+ días</span>

                  const dias = daysSince(r.fechaInicio);

                    <div key={r.id} style={{background:"#1e293b",borderLeft:"4px solid "+c.border,borderRadius:10,padding:"14px 18px",border:"1px solid #334155",borderLeftWidth:4,display:"flex",alignItems:"center",gap:14,flexWrap:"wrap"}}>
                      <div style={{background:c.bg,color:c.text,padding:"6px 12px",borderRadius:8,fontSize:13,fontWeight:700,fontFamily:"'JetBrains Mono',monospace",minWidth:60,textAlign:"center"}}>{dias}d</div>
                      <div style={{flex:1,minWidth:200}}>
                        <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:4,flexWrap:"wrap"}}>
                          <strong style={{color:"#e2e8f0",fontSize:14}}>{r.local}</strong>
                          {r.caja && <span style={{color:"#64748b",fontSize:11,fontFamily:"'JetBrains Mono',monospace",background:"#0f172a",padding:"2px 8px",borderRadius:5}}>{r.caja}</span>}

                        <div style={{color:"#94a3b8",fontSize:13}}>{r.motivo}</div>
                        <div style={{color:"#64748b",fontSize:11,marginTop:4,fontFamily:"'JetBrains Mono',monospace"}}>{r.fechaInicio} · Asignado: {r.asignadoShort || r.asignado}</div>
                      </div>
                      <button onClick={()=>setConfirmResolve(r)} style={{...S.btnSecondary,background:"rgba(34,197,94,0.15)",color:"#34d399"}}><I n="check" s={16} c="#34d399"/> Resolver</button>
                    </div>
                  );
                })}
              </div>
            </>
          )}

          {tab === "dashboard" && (
            <>
              {/* Filtros dashboard */}
              <div style={{...S.card,display:"flex",gap:10,flexWrap:"wrap",alignItems:"flex-end",marginBottom:16}}>
                <FG l="Mes"><input type="month" value={dMes} onChange={e=>{setDMes(e.target.value);setDFrom("");setDTo("");}} style={S.fInp}/></FG>
                <FG l="Local"><select value={dLocal} onChange={e=>setDLocal(e.target.value)} style={S.fInp}><option value="">Todos</option>{[...new Set(reclamosAll.map(r=>r.local).filter(Boolean))].sort().map(l=><option key={l} value={l}>{l}</option>)}</select></FG>
                <FG l="Desde"><input type="date" value={dFrom} onChange={e=>{setDFrom(e.target.value);setDMes("");}} style={S.fInp}/></FG>
                <FG l="Hasta"><input type="date" value={dTo} onChange={e=>{setDTo(e.target.value);setDMes("");}} style={S.fInp}/></FG>
                {(dLocal||dFrom||dTo||dMes) && <button onClick={()=>{setDLocal("");setDFrom("");setDTo("");setDMes("");}} style={{...S.fInp,cursor:"pointer",background:"#1e293b",color:"#f87171",border:"1px solid #334155",padding:"6px 12px",marginTop:18}}>✕ Limpiar</button>}
              </div>

              {/* KPIs */}
              <div style={S.kpiGrid}>
                <KPI border="#7c3aed" label="Total Reclamos" value={dashData.length}/>
                <KPI border="#d97706" label="En Progreso" value={totalEnProgreso}/>
                <KPI border="#16a34a" label="Resueltos" value={totalResueltos}/>
                <KPI border="#f59e0b" label="Local con más reclamos" value={localMasReclamos[0]?.nombre || "—"} valueSize={18} sub2={localMasReclamos[0] ? localMasReclamos[0].count + " reclamos" : ""}/>

              {/* Top locales y motivos */}

                <div style={S.card}>
                  <h3 style={S.cardTitle}>Top 10 Locales</h3>
                  <div style={{display:"flex",flexDirection:"column",gap:8,marginTop:14}}>
                    {localMasReclamos.length === 0 && <p style={{color:"#475569",fontSize:13}}>Sin datos</p>}

                      <div key={l.nombre} style={{display:"flex",alignItems:"center",gap:10}}>
                        <div style={{width:22,height:22,borderRadius:6,background:i<3?"#d97706":"#1e293b",display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,fontWeight:700,color:i<3?"#000":"#64748b",flexShrink:0}}>{i+1}</div>

                        <div style={{flex:1,background:"#0f172a",borderRadius:6,height:22,position:"relative",overflow:"hidden"}}>
                          <div style={{width:(l.count/maxLocal)*100+"%",height:"100%",background:"linear-gradient(90deg,#6d28d9,#a78bfa)",borderRadius:6,minWidth:l.count>0?18:0,transition:"width .6s ease"}}/>
                          <span style={{position:"absolute",right:6,top:3,fontSize:10,fontWeight:700,color:"#fff"}}>{l.count}</span>
                        </div>
                      </div>
                    ))}
                  </div>
                </div>
                <div style={S.card}>
                  <h3 style={S.cardTitle}>Motivos más repetidos</h3>
                  <div style={{display:"flex",flexDirection:"column",gap:8,marginTop:14}}>
                    {motivoMasRepetido.length === 0 && <p style={{color:"#475569",fontSize:13}}>Sin datos</p>}
                    {motivoMasRepetido.map((m,i) => (
                      <div key={m.motivo} style={{display:"flex",alignItems:"center",gap:10}}>
                        <div style={{width:22,height:22,borderRadius:6,background:i<3?"#d97706":"#1e293b",display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,fontWeight:700,color:i<3?"#000":"#64748b",flexShrink:0}}>{i+1}</div>
                        <div style={{width:150,fontSize:12,color:"#cbd5e1",fontWeight:500,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}} title={m.motivo}>{m.motivo}</div>
                        <div style={{flex:1,background:"#0f172a",borderRadius:6,height:22,position:"relative",overflow:"hidden"}}>
                          <div style={{width:(m.count/maxMotivo)*100+"%",height:"100%",background:"linear-gradient(90deg,#b45309,#fbbf24)",borderRadius:6,minWidth:m.count>0?18:0,transition:"width .6s ease"}}/>
                          <span style={{position:"absolute",right:6,top:3,fontSize:10,fontWeight:700,color:"#fff"}}>{m.count}</span>
                        </div>
                      </div>
                    ))}
                  </div>
                </div>
              </div>

              {/* Stats por técnico */}
              {isAdmin && techStats.length > 0 && <div style={S.card}>
                <h3 style={S.cardTitle}>Reclamos por Técnico</h3>
                <div style={{display:"flex",gap:16,marginTop:14,flexWrap:"wrap"}}>
                  {techStats.map(t => (
                    <div key={t.nombre} style={{background:"#0f172a",borderRadius:12,padding:"14px 20px",textAlign:"center",minWidth:110}}>
                      <div style={{width:44,height:44,borderRadius:"50%",background:"#7c3aed",display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto 6px",fontSize:18,fontWeight:700,color:"#fff"}}>{(t.nombre||"?")[0]}</div>
                      <div style={{color:"#e2e8f0",fontSize:13,fontWeight:600}}>{t.nombre || "Sin asignar"}</div>
                      <div style={{color:"#a78bfa",fontSize:26,fontWeight:800,marginTop:2}}>{t.count}</div>
                    </div>
                  ))}
                </div>
              </div>}

              {/* Lista detallada */}
              <div style={{marginTop:16}}>
                <h3 style={{...S.cardTitle,marginBottom:10}}>Reclamos del filtro ({dashData.length})</h3>
                <div style={{...S.card,padding:0,overflow:"auto"}}>
                  <table style={{width:"100%",borderCollapse:"collapse"}}>
                    <thead><tr>
                      {[
                        {key:"estado",label:"ESTADO"},{key:"local",label:"LOCAL"},{key:"caja",label:"CAJA"},
                        {key:"motivo",label:"MOTIVO"},{key:"asignado",label:"ASIGNADO"},
                        {key:"fechaInicio",label:"FECHA INICIO"},{key:"fechaResolucion",label:"RESOLUCIÓN"},{key:"nroReclamo",label:"N°"}
                      ].map(col=>(
                        <th key={col.key} style={{...S.th,cursor:"pointer",userSelect:"none"}} onClick={()=>{
                          if (sortCol===col.key) setSortDir(sortDir==="asc"?"desc":"asc");
                          else { setSortCol(col.key); setSortDir("asc"); }
                        }}>
                          {col.label} {sortCol===col.key ? (sortDir==="asc"?"▲":"▼") : ""}
                        </th>
                      ))}
                    </tr></thead>
                    <tbody>
                      {(() => {
                        const sorted = [...dashData].sort((a,b) => {
                          const va = (a[sortCol]||"").toString().toLowerCase();
                          const vb = (b[sortCol]||"").toString().toLowerCase();
                          if (va < vb) return sortDir==="asc"?-1:1;
                          if (va > vb) return sortDir==="asc"?1:-1;
                          return 0;
                        });
                        return sorted.slice(0,100).map(r => (
                          <tr key={r.id} style={{borderBottom:"1px solid rgba(51,65,85,0.4)"}}>
                            <td style={S.td}><span style={{...S.badge,background:r.estado==="Resuelto"?"#16a34a":"#d97706"}}>{r.estado}</span></td>
                            <td style={S.td}>{r.local}</td>
                            <td style={{...S.td,fontFamily:"'JetBrains Mono',monospace",fontSize:11}}>{r.caja || "—"}</td>
                            <td style={{...S.td,maxWidth:220,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{r.motivo}</td>
                            <td style={S.td}>{r.asignadoShort || r.asignado}</td>
                            <td style={{...S.td,fontFamily:"'JetBrains Mono',monospace",fontSize:11}}>{r.fechaInicio}</td>
                            <td style={{...S.td,fontFamily:"'JetBrains Mono',monospace",fontSize:11,color:r.fechaResolucion?"#34d399":"#475569"}}>{r.fechaResolucion || "—"}</td>
                            <td style={{...S.td,fontFamily:"'JetBrains Mono',monospace",fontSize:11}}>{r.nroReclamo || "—"}</td>
                          </tr>
                        ));
                      })()}
                      {dashData.length === 0 && <tr><td colSpan={8} style={{...S.td,textAlign:"center",color:"#475569",padding:40}}>Sin reclamos</td></tr>}
                    </tbody>
                  </table>
                  {dashData.length > 100 && <div style={{padding:"12px 16px",color:"#64748b",fontSize:12,textAlign:"center",borderTop:"1px solid #334155"}}>Mostrando 100 de {dashData.length} · Ajustá los filtros para ver menos</div>}
                </div>
              </div>
            </>
          )}

          {/* Modal nuevo reclamo */}
          {showNew && <NewReclamoModal api={api} locals={locals} user={user} onClose={()=>setShowNew(false)} onSuccess={()=>{onRefresh();setShowNew(false);showToast("Reclamo creado");}} showToast={showToast}/>}

          {/* Confirmar resolver */}
          {confirmResolve && <Modal onClose={()=>setConfirmResolve(null)}><div style={{textAlign:"center"}}>
            <div style={{fontSize:44,marginBottom:14}}>✅</div>
            <h3 style={{color:"#e2e8f0",marginBottom:6}}>¿Marcar como Resuelto?</h3>
            <p style={{color:"#94a3b8",fontSize:13,marginBottom:8}}><strong>{confirmResolve.local}</strong> · {confirmResolve.motivo}</p>
            <p style={{color:"#64748b",fontSize:12,marginBottom:20}}>Se registrará la fecha de resolución</p>
            <div style={{display:"flex",gap:10}}>
              <button onClick={()=>setConfirmResolve(null)} style={{...S.btnGhost,flex:1}}>Cancelar</button>
              <button onClick={handleResolve} disabled={busy} style={{...S.btnPrimary,flex:1,background:"#16a34a"}}>{busy?"...":"Resolver"}</button>
            </div>
          </div></Modal>}
        </div>
      );
    }

    // ─── Nuevo Reclamo Modal ─────────────────────────────────
    function NewReclamoModal({ api, locals, user, onClose, onSuccess, showToast }) {
      const [form, setForm] = useState({ local: "", motivo: "", caja: "", nroReclamo: "", asignado: toFull(user.nombre) });
      const [searchLocal, setSearchLocal] = useState("");
      const [showDrop, setShowDrop] = useState(false);
      const [busy, setBusy] = useState(false);

      const fl = locals.filter(l => l.activo !== false && norm(l.nombre).includes(norm(searchLocal)));

      const handleSubmit = async () => {
        if (!form.local || !form.motivo || !form.nroReclamo) { showToast("Completá Local, Motivo y N° Reclamo","error"); return; }
        setBusy(true);
        try {
          const res = await api.createReclamo(form, user.nombre);
          if (res.success) onSuccess();
          else showToast(res.error || "Error al crear","error");
        } catch { showToast("Error de conexión","error"); }
        setBusy(false);
      };

      return (
        <Modal onClose={onClose}>
          <h3 style={{color:"#e2e8f0",marginBottom:16,display:"flex",alignItems:"center",gap:8}}>
            <I n="card" s={20} c="#a78bfa"/> Nuevo Reclamo Posnet
          </h3>

          <div style={{marginBottom:14}}>
            <label style={S.formLbl}>Local <span style={{color:"#f87171"}}>*</span></label>
            <div style={{position:"relative"}}>
              <input value={searchLocal} onChange={e=>{setSearchLocal(e.target.value);setShowDrop(true);setForm({...form,local:""});}}
                onFocus={()=>setShowDrop(true)} onBlur={()=>setTimeout(()=>setShowDrop(false),200)}
                placeholder="Buscar local..." style={S.inp}/>
              {showDrop && searchLocal && <div style={S.dropdown}>
                {fl.length===0 && <div style={S.ddItem}>No se encontraron</div>}
                {fl.slice(0,6).map(l => <div key={l.id} style={S.ddItem} onMouseDown={()=>{setForm({...form,local:l.nombre});setSearchLocal(l.nombre);setShowDrop(false);}}>{l.nombre}</div>)}
              </div>}
            </div>
            {form.local && <span style={{fontSize:12,color:"#34d399",marginTop:4,display:"inline-block"}}>✓ {form.local}</span>}
          </div>

          <div style={{marginBottom:14}}>
            <label style={S.formLbl}>Motivo <span style={{color:"#f87171"}}>*</span></label>
            <textarea value={form.motivo} onChange={e=>setForm({...form,motivo:e.target.value})} placeholder="Describí el reclamo..." rows={3} style={{...S.inp,resize:"vertical",minHeight:70}}/>
          </div>

          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:14}}>
            <div>
              <label style={S.formLbl}>N° Reclamo <span style={{color:"#f87171"}}>*</span></label>
              <input value={form.nroReclamo} onChange={e=>setForm({...form,nroReclamo:e.target.value})} placeholder="Ej: 12345" style={S.inp}/>
            </div>
            <div>
              <label style={S.formLbl}>Caja <span style={{color:"#64748b",fontWeight:400}}>(opcional)</span></label>
              <select value={form.caja} onChange={e=>setForm({...form,caja:e.target.value})} style={{...S.inp,fontSize:14,padding:"10px 13px"}}>
                <option value="">—</option>
                <option value="CAJA 1">CAJA 1</option>
                <option value="CAJA 2">CAJA 2</option>
                <option value="CAJA 3">CAJA 3</option>
              </select>
            </div>
          </div>

          <div style={{marginBottom:18}}>
            <div style={S.chip}><I n="users" s={14} c="#64748b"/> Asignado a: <strong style={{color:"#e2e8f0",marginLeft:4}}>{form.asignado}</strong></div>
          </div>

          <div style={{display:"flex",gap:10}}>
            <button onClick={onClose} style={{...S.btnGhost,flex:1}}>Cancelar</button>
            <button onClick={handleSubmit} disabled={busy} style={{...S.btnPrimary,flex:1}}>{busy ? "Creando..." : "✓ Crear Reclamo"}</button>
          </div>
        </Modal>
      );
    }

    // ─── Change Password Modal ─────────────────────────────
    function ChangePasswordModal({ api, user, onClose, showToast, onLogout }) {
      const [current, setCurrent] = useState("");
      const [newPwd, setNewPwd] = useState("");
      const [confirm, setConfirm] = useState("");
      const [busy, setBusy] = useState(false);
      const [err, setErr] = useState("");

      const handleSave = async () => {
        setErr("");
        if (!current) { setErr("Ingresá tu contraseña actual"); return; }
        if (newPwd.length < 4) { setErr("La nueva contraseña debe tener al menos 4 caracteres"); return; }
        if (newPwd !== confirm) { setErr("Las contraseñas no coinciden"); return; }
        setBusy(true);
        try {
          const res = await api.changeOwnPassword(user.id, current, newPwd);
          if (res.success) {
            showToast("Contraseña actualizada. Volvé a iniciar sesión.");
            onClose();
            onLogout();
          } else { setErr(res.error || "Error al cambiar"); }
        } catch { setErr("Error de conexión"); }
        setBusy(false);
      };

      return (
        <Modal onClose={onClose}>
          <h3 style={{color:"#e2e8f0",marginBottom:16,display:"flex",alignItems:"center",gap:8}}>
            <I n="key" s={20} c="#a78bfa"/> Cambiar Contraseña
          </h3>
          <div style={{marginBottom:14}}>
            <label style={S.lbl}>Contraseña actual</label>
            <input type="password" value={current} onChange={e=>{setCurrent(e.target.value);setErr("");}} placeholder="••••••••" style={S.inp}/>
          </div>
          <div style={{marginBottom:14}}>
            <label style={S.lbl}>Nueva contraseña</label>
            <input type="password" value={newPwd} onChange={e=>{setNewPwd(e.target.value);setErr("");}} placeholder="Mínimo 4 caracteres" style={S.inp}/>
          </div>
          <div style={{marginBottom:14}}>
            <label style={S.lbl}>Confirmar nueva contraseña</label>
            <input type="password" value={confirm} onChange={e=>{setConfirm(e.target.value);setErr("");}} onKeyDown={e=>e.key==="Enter"&&handleSave()} placeholder="Repetí la nueva contraseña" style={S.inp}/>
          </div>
          {err && <p style={{color:"#f87171",fontSize:13,margin:"0 0 12px"}}>{err}</p>}
          <div style={{display:"flex",gap:10}}>
            <button onClick={onClose} style={{...S.btnGhost,flex:1}}>Cancelar</button>
            <button onClick={handleSave} disabled={busy} style={{...S.btnPrimary,flex:1}}>{busy ? "Guardando..." : "Guardar"}</button>
          </div>
        </Modal>
      );
    }

    // ─── Shared Components ───────────────────────────────────
    function Modal({ children, onClose }) {
      return <div style={S.overlay} onClick={onClose}><div style={{...S.modal,animation:"fadeUp .25s ease"}} onClick={e=>e.stopPropagation()}>
        <button onClick={onClose} style={{position:"absolute",top:10,right:10,...S.icoBtn}}><I n="close" s={18} c="#64748b"/></button>{children}
      </div></div>;
    }
    function FG({ l, children }) { return <div style={{display:"flex",flexDirection:"column",gap:3}}><label style={{color:"#475569",fontSize:10,fontWeight:700,textTransform:"uppercase",letterSpacing:.8}}>{l}</label>{children}</div>; }
    function KPI({ border, label, value, sub, sub2, valueSize }) {
      return <div style={{...S.card,borderTop:"3px solid "+border,padding:"18px 22px"}}>
        <div style={{color:"#64748b",fontSize:11,fontWeight:700,textTransform:"uppercase",letterSpacing:.5}}>{label}</div>
        <div style={{color:"#f1f5f9",fontSize:valueSize||34,fontWeight:800,marginTop:6,fontFamily:"'JetBrains Mono','Outfit',sans-serif"}}>{value}{sub && <span style={{color:"#475569",fontSize:16,fontWeight:400,marginLeft:4}}>{sub}</span>}</div>
        {sub2 && <div style={{color:"#64748b",fontSize:11,marginTop:4}}>{sub2}</div>}
      </div>;
    }

    // ─── Styles ──────────────────────────────────────────────
    const S = {
      root:{display:"flex",minHeight:"100vh",background:"#0b1120",fontFamily:"'Outfit',sans-serif"},
      center:{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",height:"100vh",background:"#0b1120",padding:20},
      spinner:{width:36,height:36,border:"3px solid #1e293b",borderTopColor:"#7c3aed",borderRadius:"50%",animation:"spin .7s linear infinite"},
      sidebar:{position:"fixed",top:0,left:0,height:"100vh",background:"#0f172a",borderRight:"1px solid #1e293b",display:"flex",flexDirection:"column",zIndex:100,overflow:"hidden",transition:"width .25s ease"},
      sideHead:{padding:"16px 14px",display:"flex",alignItems:"center",justifyContent:"space-between",borderBottom:"1px solid #1e293b"},
      logoBox:{width:34,height:34,borderRadius:9,background:"linear-gradient(135deg,#6d28d9,#a78bfa)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:17,flexShrink:0},
      logoTxt:{color:"#e2e8f0",fontSize:19,fontWeight:800,letterSpacing:-.5},
      togBtn:{background:"none",border:"none",cursor:"pointer",padding:4,borderRadius:6,display:"flex"},
      nav:{flex:1,padding:"10px 8px",display:"flex",flexDirection:"column",gap:2},
